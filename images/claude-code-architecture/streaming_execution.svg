<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #1e1e1e; }
      .text-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 20px; font-weight: bold; fill: #ffffff; }
      .text-sub { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 16px; font-weight: bold; fill: #d97757; }
      .text-item { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; fill: #e0e0e0; }
      .text-small { font-family: monospace; font-size: 12px; fill: #aaaaaa; }
      
      .box-llm { fill: #2c3e50; stroke: #34495e; stroke-width: 2; rx: 4; }
      .box-llm-stream { fill: #2c3e50; stroke: #34495e; stroke-width: 2; rx: 4; stroke-dasharray: 4 4; }
      .box-tool-safe { fill: #1e4620; stroke: #2ecc71; stroke-width: 2; rx: 4; }
      .box-tool-exclusive { fill: #4a1515; stroke: #e74c3c; stroke-width: 2; rx: 4; }
      
      .time-axis { stroke: #555; stroke-width: 2; }
      .time-dash { stroke: #555; stroke-width: 1; stroke-dasharray: 4 4; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555" />
    </marker>
  </defs>

  <rect width="800" height="450" class="bg" rx="16" ry="16"/>
  <text x="400" y="40" text-anchor="middle" class="text-title" style="font-size: 24px; fill: #d97757;">流式工具并发 (Streaming Execution)</text>

  <!-- Time Axis -->
  <line x1="50" y1="80" x2="750" y2="80" class="time-axis" marker-end="url(#arrow)"/>
  <text x="730" y="70" text-anchor="end" class="text-small">Time (t)</text>

  <!-- Traditional Execution -->
  <text x="50" y="110" class="text-sub">传统串行执行</text>
  
  <rect x="50" y="130" width="300" height="40" class="box-llm" />
  <text x="200" y="155" text-anchor="middle" class="text-item">LLM 完整生成 Tool 1, 2, 3</text>
  
  <line x1="350" y1="150" x2="380" y2="150" stroke="#fff" stroke-width="2"/>
  
  <rect x="380" y="130" width="120" height="40" class="box-tool-safe" />
  <text x="440" y="155" text-anchor="middle" class="text-item">执行 Tool 1</text>
  
  <line x1="500" y1="150" x2="530" y2="150" stroke="#fff" stroke-width="2"/>
  
  <rect x="530" y="130" width="120" height="40" class="box-tool-safe" />
  <text x="590" y="155" text-anchor="middle" class="text-item">执行 Tool 2</text>

  <!-- Streaming Execution -->
  <line x1="50" y1="200" x2="750" y2="200" class="time-dash" />
  
  <text x="50" y="240" class="text-sub">StreamingToolExecutor (抢跑并发)</text>
  
  <!-- LLM Generation Box (Streaming) -->
  <rect x="50" y="260" width="400" height="140" class="box-llm-stream" fill-opacity="0.3"/>
  <text x="130" y="335" text-anchor="middle" class="text-item">LLM 流式生成中...</text>
  
  <!-- Tool 1 (Safe, concurrent) -->
  <rect x="180" y="270" width="200" height="30" class="box-tool-safe" />
  <text x="280" y="290" text-anchor="middle" class="text-item">Tool 1: Read (安全并发)</text>
  
  <!-- Tool 2 (Safe, concurrent) -->
  <rect x="250" y="315" width="200" height="30" class="box-tool-safe" />
  <text x="350" y="335" text-anchor="middle" class="text-item">Tool 2: Grep (安全并发)</text>
  
  <!-- Tool 3 (Exclusive) -->
  <rect x="470" y="360" width="220" height="30" class="box-tool-exclusive" />
  <text x="580" y="380" text-anchor="middle" class="text-item">Tool 3: Bash (独占执行)</text>
  
  <line x1="180" y1="260" x2="180" y2="270" stroke="#fff" stroke-width="2"/>
  <line x1="250" y1="260" x2="250" y2="315" stroke="#fff" stroke-width="2"/>
  <line x1="450" y1="260" x2="470" y2="360" stroke="#fff" stroke-width="2"/>
  
</svg>