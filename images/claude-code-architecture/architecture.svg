<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #1e1e1e; }
      .card { fill: #2a2a2a; stroke: #3a3a3a; stroke-width: 2; rx: 8; ry: 8; }
      .card-highlight { fill: #2d2624; stroke: #d97757; stroke-width: 2; rx: 8; ry: 8; }
      .text-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #ffffff; }
      .text-sub { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 14px; fill: #aaaaaa; }
      .text-item { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 500; fill: #e0e0e0; }
      .accent { fill: #d97757; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97757" />
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" class="bg" rx="16" ry="16"/>
  
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" class="text-title" style="font-size: 24px; fill: #d97757;">Claude Code 全局架构透视</text>
  
  <!-- Top Layer: The Brain -->
  <rect x="50" y="90" width="700" height="120" class="card-highlight" />
  <text x="400" y="125" text-anchor="middle" class="text-title">大脑层 (The Brain)</text>
  
  <rect x="80" y="145" width="300" height="40" fill="#3a3a3a" rx="4"/>
  <text x="230" y="170" text-anchor="middle" class="text-item">异步生成器主循环 (Async Generator)</text>
  
  <rect x="420" y="145" width="300" height="40" fill="#3a3a3a" rx="4"/>
  <text x="570" y="170" text-anchor="middle" class="text-item">缓存优化的 Prompt 架构</text>
  
  <!-- Connectors -->
  <path d="M 230 210 L 230 230" stroke="#d97757" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 570 210 L 570 230" stroke="#d97757" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Middle Layer: Core Services & Security -->
  <rect x="50" y="240" width="335" height="120" class="card" />
  <text x="217" y="275" text-anchor="middle" class="text-title">工具调度引擎 (Core Services)</text>
  <rect x="80" y="295" width="275" height="40" fill="#333" rx="4"/>
  <text x="217" y="320" text-anchor="middle" class="text-item">流式并发执行与 Fail-Closed</text>
  
  <rect x="415" y="240" width="335" height="120" class="card" />
  <text x="582" y="275" text-anchor="middle" class="text-title">安全与权限护盾</text>
  <rect x="445" y="295" width="275" height="40" fill="#333" rx="4"/>
  <text x="582" y="320" text-anchor="middle" class="text-item">5 层上下文管道 / 熔断器</text>

  <!-- Connectors -->
  <path d="M 217 360 L 217 380" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 582 360 L 582 380" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Bottom Layer: Infrastructure -->
  <rect x="50" y="390" width="700" height="80" class="card" />
  <text x="400" y="425" text-anchor="middle" class="text-title">基础设施层 (Infrastructure)</text>
  <text x="400" y="450" text-anchor="middle" class="text-item">Bun / Node Runtime · Tree-sitter · 状态管理器</text>
</svg>