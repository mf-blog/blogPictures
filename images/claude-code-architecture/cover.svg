<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #121212; }
      .grid { stroke: #333333; stroke-width: 1; }
      .text-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 56px; font-weight: 800; fill: #ffffff; letter-spacing: 2px; }
      .text-subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 32px; font-weight: 600; fill: #d97757; }
      .text-author { font-family: monospace; font-size: 24px; fill: #aaaaaa; }
      .accent { fill: #d97757; }
      .glow { fill: rgba(217, 119, 87, 0.15); }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none" />
      <path d="M 40 0 L 0 0 0 40" fill="none" class="grid" />
    </pattern>
    <linearGradient id="fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#121212" stop-opacity="0" />
      <stop offset="100%" stop-color="#121212" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" class="bg"/>
  
  <!-- Grid -->
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Glowing Circles / Abstract Tech Elements -->
  <circle cx="950" cy="200" r="150" class="glow" filter="blur(20px)" />
  <circle cx="950" cy="200" r="80" fill="none" stroke="#d97757" stroke-width="2" stroke-dasharray="10 5" />
  <circle cx="950" cy="200" r="60" fill="none" stroke="#d97757" stroke-width="1" opacity="0.5" />
  <circle cx="950" cy="200" r="10" class="accent" />
  
  <path d="M 950 100 L 950 300 M 850 200 L 1050 200" stroke="#d97757" stroke-width="1" opacity="0.5" />
  
  <!-- Code/Tech decoration lines -->
  <path d="M 100 500 L 300 500 L 350 450 L 1100 450" fill="none" stroke="#d97757" stroke-width="3" opacity="0.8" />
  <circle cx="300" cy="500" r="5" class="accent" />
  <circle cx="350" cy="450" r="5" class="accent" />

  <!-- Fade overlay at bottom -->
  <rect y="400" width="1200" height="230" fill="url(#fade)" />

  <!-- Text Elements -->
  <text x="100" y="240" class="text-subtitle">从"提示词工程"到"系统级工程"的范式转移</text>
  <text x="100" y="320" class="text-title">Claude Code 源码泄露：</text>
  <text x="100" y="390" class="text-title">最强 AI Coding Agent 架构深度解构</text>
  
  <rect x="100" y="480" width="80" height="40" fill="#333333" rx="4" />
  <text x="140" y="508" text-anchor="middle" class="text-author" style="fill:#fff; font-size:18px;">AUTHOR</text>
  <text x="200" y="508" class="text-author">changyou</text>
  
  <rect x="400" y="480" width="60" height="40" fill="#333333" rx="4" />
  <text x="430" y="508" text-anchor="middle" class="text-author" style="fill:#fff; font-size:18px;">DATE</text>
  <text x="480" y="508" class="text-author">2026-04-06</text>

</svg>