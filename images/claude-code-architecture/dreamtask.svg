<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #1e1e1e; }
      .text-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 24px; font-weight: bold; fill: #d97757; }
      .text-phase { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 18px; font-weight: bold; fill: #ffffff; }
      .text-desc { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; fill: #aaaaaa; }
      
      .circle-node { fill: #2a2a2a; stroke: #d97757; stroke-width: 3; }
      .line { stroke: #555; stroke-width: 3; }
      .path-line { stroke: #555; stroke-width: 3; stroke-dasharray: 6 6; fill: none; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555" />
    </marker>
  </defs>

  <rect width="800" height="600" class="bg" rx="16" ry="16"/>
  <text x="400" y="50" text-anchor="middle" class="text-title">仿生学架构：DreamTask（睡眠记忆整理）</text>

  <!-- Flow connecting circles -->
  <line x1="200" y1="150" x2="200" y2="450" class="line" />
  
  <path d="M 200 450 C 100 450, 100 150, 200 150" class="path-line" marker-end="url(#arrow)"/>

  <!-- Phase 1 -->
  <circle cx="200" cy="150" r="15" class="circle-node" />
  <text x="240" y="145" class="text-phase">Phase 1 - 活跃 (Active Phase)</text>
  <text x="240" y="170" class="text-desc">收集日常对话与代码变更，记录操作日志</text>

  <!-- Phase 2 -->
  <circle cx="200" cy="250" r="15" class="circle-node" />
  <text x="240" y="245" class="text-phase">Phase 2 - 闲置 (Idle Trigger)</text>
  <text x="240" y="270" class="text-desc">侦测系统资源闲置，等待无用户操作窗口</text>

  <!-- Phase 3 -->
  <circle cx="200" cy="350" r="15" class="circle-node" style="fill: #d97757;" />
  <text x="240" y="345" class="text-phase" style="fill: #d97757;">Phase 3 - 睡眠 (Dream Task)</text>
  <text x="240" y="370" class="text-desc">启动后台子 Agent 提取上下文洞察，更新 MEMORY.md</text>

  <!-- Phase 4 -->
  <circle cx="200" cy="450" r="15" class="circle-node" />
  <text x="240" y="445" class="text-phase">Phase 4 - 保护 (Rollback Lock)</text>
  <text x="240" y="470" class="text-desc">若被用户动作打断，重置时间戳，等待下次重试</text>

</svg>