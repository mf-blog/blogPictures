<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="72" y1="44" x2="1180" y2="676" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081A2C"/>
      <stop offset="0.5" stop-color="#10263F"/>
      <stop offset="1" stop-color="#163243"/>
    </linearGradient>
    <linearGradient id="leftGlow" x1="164" y1="198" x2="508" y2="566" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7B25D"/>
      <stop offset="1" stop-color="#E37256"/>
    </linearGradient>
    <linearGradient id="rightGlow" x1="754" y1="162" x2="1090" y2="592" gradientUnits="userSpaceOnUse">
      <stop stop-color="#41DEC3"/>
      <stop offset="1" stop-color="#7BE2FF"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" rx="28" fill="url(#bg2)"/>
  <path d="M640 120V612" stroke="#35617C" stroke-width="2" stroke-dasharray="10 12"/>
  <text x="98" y="114" fill="#F8C27E" font-family="IBM Plex Mono, Menlo, monospace" font-size="22">tool / carrier</text>
  <text x="720" y="114" fill="#7FEBD5" font-family="IBM Plex Mono, Menlo, monospace" font-size="22">framework / kernel</text>
  <text x="98" y="174" fill="#FFFFFF" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="48" font-weight="700">工具是载体，框架是内核</text>
  <text x="98" y="222" fill="#A7C4D7" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="25">左边会换名字，右边会不断复利</text>
  <g>
    <rect x="112" y="280" width="418" height="284" rx="28" fill="#0D2031" stroke="#5C4D45"/>
    <circle cx="220" cy="358" r="78" fill="url(#leftGlow)" opacity="0.22"/>
    <text x="144" y="348" fill="#FFF0DE" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="40" font-weight="700">工具</text>
    <text x="144" y="390" fill="#E5B48A" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">界面、指令、版本、玩法</text>
    <rect x="144" y="430" width="150" height="54" rx="16" fill="#372A24" stroke="#A26E4F"/>
    <text x="219" y="464" text-anchor="middle" fill="#FFE7C7" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">今天流行</text>
    <rect x="318" y="430" width="150" height="54" rx="16" fill="#2E2626" stroke="#935A53"/>
    <text x="393" y="464" text-anchor="middle" fill="#FFE7C7" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">明天替代</text>
    <path d="M164 520C220 552 304 564 414 556" stroke="#CA8D62" stroke-width="4" stroke-dasharray="10 10"/>
    <text x="144" y="534" fill="#A9BFCE" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">学的是按钮，记住的是名字，</text>
    <text x="144" y="564" fill="#A9BFCE" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">下个版本一来就要重学</text>
  </g>
  <g>
    <rect x="750" y="224" width="418" height="372" rx="28" fill="#0D2031" stroke="#2E6F81"/>
    <circle cx="986" cy="318" r="126" fill="url(#rightGlow)" opacity="0.15"/>
    <text x="782" y="292" fill="#E7FBF5" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="40" font-weight="700">框架</text>
    <text x="782" y="334" fill="#9DE2D8" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">问题分解 · 迭代设计 · 假设验证</text>
    <rect x="782" y="382" width="354" height="58" rx="18" fill="#123047" stroke="#2F7284"/>
    <text x="959" y="420" text-anchor="middle" fill="#E8FBF7" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28">换工具，但不换判断结构</text>
    <rect x="782" y="460" width="354" height="58" rx="18" fill="#123047" stroke="#2F7284"/>
    <text x="959" y="498" text-anchor="middle" fill="#E8FBF7" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28">换场景，但不换迭代方法</text>
    <rect x="782" y="538" width="354" height="58" rx="18" fill="#123047" stroke="#2F7284"/>
    <text x="959" y="576" text-anchor="middle" fill="#E8FBF7" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28">换角色，但不换验证标准</text>
  </g>
