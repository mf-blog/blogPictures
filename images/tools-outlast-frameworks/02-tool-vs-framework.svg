<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071825"/>
      <stop offset="0.5" stop-color="#0E2438"/>
      <stop offset="1" stop-color="#142F43"/>
    </linearGradient>
    <linearGradient id="leftGlow2" x1="160" y1="260" x2="500" y2="580" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7B25D"/>
      <stop offset="1" stop-color="#E37256"/>
    </linearGradient>
    <linearGradient id="rightGlow2" x1="760" y1="220" x2="1100" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#41DEC3"/>
      <stop offset="1" stop-color="#7BE2FF"/>
    </linearGradient>
    <filter id="gb2" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg2)"/>

  <!-- Grid -->
  <g opacity="0.10" stroke="#A5D9EB">
    <path d="M0 120H1280M0 240H1280M0 360H1280M0 480H1280M0 600H1280"/>
    <path d="M120 0V720M280 0V720M440 0V720M600 0V720M760 0V720M920 0V720M1080 0V720"/>
  </g>

  <!-- Center divider -->
  <path d="M640 56V680" stroke="#2A5B73" stroke-width="1.5" stroke-dasharray="10 14"/>

  <!-- Header -->
  <text x="80" y="88" fill="#F8C27E" font-family="IBM Plex Mono, Menlo, monospace" font-size="22">tool / carrier</text>
  <text x="720" y="88" fill="#7FEBD5" font-family="IBM Plex Mono, Menlo, monospace" font-size="22">framework / kernel</text>
  <text x="80" y="152" fill="#FFFFFF" font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" font-size="48" font-weight="700">工具是载体，框架是内核</text>
  <text x="80" y="200" fill="#A7C4D7" font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" font-size="26">左边会换名字，右边不断复利</text>

  <!-- Left: Tool card -->
  <g>
    <rect x="80" y="240" width="494" height="418" rx="28" fill="#0D2031" stroke="#5B4A42" stroke-width="1.5"/>
    <!-- Glow blob -->
    <g filter="url(#gb2)" opacity="0.2">
      <circle cx="210" cy="350" r="80" fill="#F7B25D"/>
    </g>
    <text x="114" y="310" fill="#FFF0DE" font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" font-size="42" font-weight="700">工具</text>
    <text x="114" y="356" fill="#E5B48A" font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" font-size="24">界面、指令、版本、玩法</text>
    <!-- Buttons -->
    <rect x="114" y="390" width="164" height="58" rx="18" fill="#3A2922" stroke="#A26E4F"/>
    <text x="196" y="427" text-anchor="middle" fill="#FFE7C7" font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" font-size="26">今天流行</text>
    <rect x="302" y="390" width="164" height="58" rx="18" fill="#2E2424" stroke="#934F49"/>
    <text x="384" y="427" text-anchor="middle" fill="#FFE7C7" font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" font-size="26">明天替代</text>
    <!-- Dash line -->
    <path d="M130 476C200 510 320 522 490 514" stroke="#CA8D62" stroke-width="3" stroke-dasharray="8 10"/>
    <!-- Description -->
    <text x="114" y="508" fill="#A9BFCE" font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" font-size="22">学的是按钮，记住的是名字</text>
    <text x="114" y="540" fill="#A9BFCE" font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" font-size="22">下个版本一来就要重学</text>
    <text x="114" y="610" fill="#6B8FA0" font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" font-size="20">永远在追工具</text>
  </g>

  <!-- Right: Framework card -->
  <g>
    <rect x="706" y="190" width="494" height="480" rx="28" fill="#0D2031" stroke="#2B6F81" stroke-width="1.5"/>
    <!-- Glow blob -->
    <g filter="url(#gb2)" opacity="0.15">
      <circle cx="980" cy="360" r="120" fill="#41DEC3"/>
    </g>
    <text x="740" y="258" fill="#E7FBF5" font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" font-size="42" font-weight="700">框架</text>
    <text x="740" y="302" fill="#9DE2D8" font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" font-size="24">问题分解 · 迭代设计 · 假设验证</text>
    <!-- Three rows -->
    <rect x="740" y="336" width="424" height="62" rx="18" fill="#0F2E46" stroke="#2B6F81"/>
    <text x="952" y="376" text-anchor="middle" fill="#E8FBF7" font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" font-size="26">换工具，但不换判断结构</text>
    <rect x="740" y="416" width="424" height="62" rx="18" fill="#0F2E46" stroke="#2B6F81"/>
    <text x="952" y="456" text-anchor="middle" fill="#E8FBF7" font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" font-size="26">换场景，但不换迭代方法</text>
    <rect x="740" y="496" width="424" height="62" rx="18" fill="#0F2E46" stroke="#2B6F81"/>
    <text x="952" y="536" text-anchor="middle" fill="#E8FBF7" font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" font-size="26">换角色，但不换验证标准</text>
    <text x="740" y="622" fill="#4BBDD4" font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" font-size="20">永远在用工具</text>
  </g>
</svg>
