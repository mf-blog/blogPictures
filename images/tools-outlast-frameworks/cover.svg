<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071825"/>
      <stop offset="0.55" stop-color="#0E2438"/>
      <stop offset="1" stop-color="#142F43"/>
    </linearGradient>
    <linearGradient id="ring" x1="780" y1="180" x2="1080" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#41DFC3"/>
      <stop offset="1" stop-color="#7BE2FF"/>
    </linearGradient>
    <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.12" stroke="#A5D9EB">
    <path d="M0 105H1200M0 210H1200M0 315H1200M0 420H1200M0 525H1200"/>
    <path d="M100 0V630M250 0V630M400 0V630M550 0V630M700 0V630M850 0V630M1000 0V630M1150 0V630"/>
  </g>

  <!-- Glow blobs -->
  <g filter="url(#glow1)" opacity="0.25">
    <circle cx="930" cy="315" r="160" fill="#3FE3C9"/>
  </g>
  <g filter="url(#glow2)" opacity="0.18">
    <circle cx="160" cy="520" r="80" fill="#2CA1FF"/>
  </g>

  <!-- Divider line -->
  <path d="M540 60V570" stroke="#2A5B73" stroke-width="1.5" stroke-dasharray="8 12"/>

  <!-- ===== LEFT: Title area ===== -->
  <!-- Tag label -->
  <text x="60" y="102" fill="#7FEBD5" font-family="IBM Plex Mono, Menlo, monospace" font-size="20">AI / 个人成长 / 方法论</text>

  <!-- Main title -->
  <text x="60" y="196" fill="#FFFFFF" font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" font-size="76" font-weight="700">工具会过时，</text>
  <text x="60" y="288" fill="#FFFFFF" font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" font-size="76" font-weight="700">框架不会</text>

  <!-- Divider bar -->
  <rect x="60" y="316" width="80" height="5" rx="3" fill="#3FE3C9"/>

  <!-- Subtitle -->
  <text x="60" y="370" fill="#9FC7DC" font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" font-size="28">学工具是战术，学框架是战略</text>

  <!-- Tagline box -->
  <rect x="60" y="416" width="424" height="66" rx="18" fill="#0C2035" stroke="#2A5E77"/>
  <text x="80" y="456" fill="#D4EAF5" font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" font-size="22">把新工具接进旧框架，而不是反过来</text>

  <!-- Three keywords -->
  <g font-family="IBM Plex Mono, Menlo, monospace" font-size="18" fill="#4BBDD4">
    <text x="60" y="536">分解问题</text>
    <text x="60" y="560" font-size="14" fill="#3A7A8A">·</text>
    <text x="172" y="536">设计迭代</text>
    <text x="284" y="536">验证假设</text>
  </g>
  <g font-family="IBM Plex Mono, Menlo, monospace" font-size="14" fill="#2C6A7A" opacity="0.8">
    <text x="60" y="558">decompose</text>
    <text x="170" y="558">iterate</text>
    <text x="264" y="558">validate</text>
  </g>

  <!-- ===== RIGHT: Framework cycle diagram ===== -->
  <!-- Outer ring -->
  <circle cx="890" cy="315" r="188" fill="#071520" stroke="#1E4B60" stroke-width="1.5"/>
  <!-- Animated-style dashed ring -->
  <circle cx="890" cy="315" r="152" fill="none" stroke="url(#ring)" stroke-width="20" stroke-linecap="round"
    stroke-dasharray="220 40 148 40 188 40"/>

  <!-- Arrow heads -->
  <path d="M978 208L1006 194L995 226" fill="#7BE2FF"/>
  <path d="M997 426L1024 442L993 452" fill="#7BE2FF"/>
  <path d="M795 426L769 444L768 410" fill="#7BE2FF"/>
  <path d="M788 208L762 190L793 182" fill="#7BE2FF"/>

  <!-- Step labels -->
  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" font-weight="600" font-size="26">
    <!-- Top: 改 -->
    <rect x="826" y="96" width="130" height="52" rx="14" fill="#0F2C3E" stroke="#2A6478"/>
    <text x="891" y="130" text-anchor="middle" fill="#E5F8F2">改一个东西</text>
    <!-- Right: 打分 -->
    <rect x="1042" y="290" width="120" height="52" rx="14" fill="#0F2C3E" stroke="#2A6478"/>
    <text x="1102" y="324" text-anchor="middle" fill="#E5F8F2">持续打分</text>
    <!-- Bottom: 保留 -->
    <rect x="826" y="478" width="130" height="52" rx="14" fill="#0F2C3E" stroke="#2A6478"/>
    <text x="891" y="512" text-anchor="middle" fill="#E5F8F2">决定保留</text>
    <!-- Left: 回滚 -->
    <rect x="620" y="290" width="120" height="52" rx="14" fill="#0F2C3E" stroke="#2A6478"/>
    <text x="680" y="324" text-anchor="middle" fill="#E5F8F2">低分回滚</text>
  </g>

  <!-- Center circle -->
  <circle cx="890" cy="315" r="78" fill="#0A1E2D" stroke="#44D9C2" stroke-opacity="0.7" stroke-width="1.5"/>
  <text x="890" y="308" text-anchor="middle" fill="#FFFFFF" font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" font-size="40" font-weight="700">框架</text>
  <text x="890" y="346" text-anchor="middle" fill="#5BBFCE" font-family="IBM Plex Mono, Menlo, monospace" font-size="16">reusable · portable</text>
</svg>
