    <text x="0" y="472" class="cardText" fill="#506577">但不知道钱卡在哪一环</text>
  </g>

  <g transform="translate(662 248)">
    <text x="0" y="0" class="cardTitle" fill="#8C5724">懂行业</text>
    <text x="0" y="38" class="cardTitle" fill="#C17A35">不懂 AI</text>
    <circle cx="128" cy="152" r="32" fill="#6B4B31"/>
    <path d="M82 260C82 212 103 182 128 182C153 182 174 212 174 260V322H82V260Z" fill="#D5904B"/>
    <rect x="202" y="94" width="130" height="96" rx="16" fill="#7A573B"/>
    <rect x="228" y="118" width="78" height="12" rx="6" fill="#F3D6B2"/>
    <rect x="228" y="144" width="78" height="12" rx="6" fill="#F3D6B2"/>
    <rect x="228" y="170" width="78" height="12" rx="6" fill="#F3D6B2"/>
    <rect x="220" y="254" width="118" height="58" rx="12" fill="#F7E7D5"/>
    <text x="246" y="292" class="big" fill="#8C5724">?</text>
    <text x="0" y="404" class="cardText" fill="#6C5A4A">知道流程问题</text>
    <text x="0" y="438" class="cardText" fill="#6C5A4A">知道成本堆在哪里</text>
    <text x="0" y="472" class="cardText" fill="#6C5A4A">但不知道怎么重构</text>
  </g>

