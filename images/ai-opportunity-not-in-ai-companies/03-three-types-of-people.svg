  <rect x="1084" y="166" width="404" height="612" rx="32" fill="#F8F7EE" stroke="#D6C690" stroke-width="6"/>

  <g transform="translate(176 248)">
    <text x="0" y="0" class="cardTitle" fill="#224666">懂 AI</text>
    <text x="0" y="38" class="cardTitle" fill="#5C7FA0">不懂行业</text>
    <circle cx="128" cy="152" r="32" fill="#20435C"/>
    <path d="M82 260C82 212 103 182 128 182C153 182 174 212 174 260V322H82V260Z" fill="#5BAEE3"/>
