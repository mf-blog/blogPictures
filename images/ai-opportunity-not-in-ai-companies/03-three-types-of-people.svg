    <path d="M88 274C88 220 111 188 142 188C173 188 196 220 196 274V344H88V274Z" fill="#D9AB52"/>
    <rect x="24" y="110" width="98" height="118" rx="16" fill="#203F59" stroke="#7FC8F0" stroke-width="4"/>
    <rect x="46" y="138" width="54" height="8" rx="4" fill="#F3D79D"/>
    <rect x="46" y="158" width="54" height="8" rx="4" fill="#F3D79D"/>
    <rect x="46" y="178" width="54" height="8" rx="4" fill="#F3D79D"/>
    <rect x="214" y="110" width="110" height="124" rx="16" fill="#FFF4E3" stroke="#A16C34" stroke-width="4"/>
    <rect x="238" y="142" width="62" height="10" rx="5" fill="#A16C34"/>
    <rect x="238" y="166" width="62" height="10" rx="5" fill="#D59A56"/>
