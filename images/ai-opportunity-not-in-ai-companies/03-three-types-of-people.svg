<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="60" x2="1480" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCFAF5"/>
      <stop offset="1" stop-color="#EEE6D8"/>
    </linearGradient>
    <style>
      .title { font: 700 52px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill:#1F2B36; }
      .cardTitle { font: 700 30px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .cardText { font: 500 19px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .big { font: 700 28px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="120" y="112" class="title">AI 时代只剩三种人</text>

  <rect x="112" y="186" width="404" height="572" rx="28" fill="#EFF7FE" stroke="#BCD8F2" stroke-width="4"/>
