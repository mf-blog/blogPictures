    <path d="M142 252V292" stroke="#FFF0C8" stroke-width="8" stroke-linecap="round"/>
    <circle cx="58" cy="386" r="18" fill="#7FC8F0"/>
    <circle cx="142" cy="408" r="18" fill="#D9AB52"/>
    <circle cx="226" cy="386" r="18" fill="#A16C34"/>
